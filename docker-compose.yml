services:
  soup.api:
    image: soup.api
    build:
      context: ./src/Soup.Api
      dockerfile: ./Dockerfile
    ports:
      - '5000:8080'
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - SOUP_API_Auth__Jwt__Authority=http://auth.wiedersehen:8080
      - SOUP_API_Auth__Jwt__ValidateAudience=false
      - SOUP_API_Auth__Jwt__ValidIssuers__0=http://auth.wiedersehen:8080
      - SOUP_API_Auth__Jwt__ValidIssuers__1=http://localhost:5002
      - SOUP_API_Auth__Jwt__RequireHttpsMetadata=false

  auth.wiedersehen:
    image: auth.wiedersehen
    build:
      context: ./src/Auth.Wiedersehen
      dockerfile: ./Dockerfile
    ports:
      - '5002:8080'


